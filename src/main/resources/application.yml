minio:
  endpoint: '${MINIO_ENDPOINT}'
  username: '${MINIO_USERNAME}'
  password: '${MINIO_PASSWORD}'
rabbitmq.host: ${RABBITMQ_HOST:`localhost`}
micronaut:
  application:
    name: oda-files-service
  server:
     max-request-size: '100MB'
     multipart:
         max-file-size: '100MB'
  security:
    token:
      bearer:
        enabled: true
      cookie:
        enabled: true
      jwt:
        signatures:
          jwks:
            keycloak:
              url: ${JWKS_URI}
  caches:
    jwks:
      expire-after-write: 240h
flyway:
  datasources:
    default:
      enabled: true
datasources:
  default:
    url: ${JDBC_URL:`jdbc:postgresql://localhost/postgres?currentSchema=files`}
    username: ${JDBC_USER:`postgres`}
    password: ${JDBC_PASSWORD:`postgres`}
    driverClassName: 'org.postgresql.Driver'
    maximumPoolSize: 3
